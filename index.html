<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Relay AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --glow: #38bdf8;
    }

    /* This part fixes the "jumping to the top" issue */
    body {
      background: #020617;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Keeps it centered vertically */
      margin: 0;
      overflow: hidden;
    }

    #chat-card {
      width: 800px;
      height: 85vh;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    #chat-header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60px;
    }

    #chat-header img {
      max-height: 50px;
      width: auto;
      filter: drop-shadow(0 0 8px var(--glow));
    }

    #messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
    .user { align-self: flex-end; background: var(--glow); color: #020617; font-weight: 500; }
    .ai { align-self: flex-start; background: rgba(255,255,255,0.1); border: 1px solid var(--border); }
    
    .input-box {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0,0,0,0.2);
    }

    input[type="text"] {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      color: white;
      outline: none;
    }

    button {
      background: white;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="chat-card">
    <div id="chat-header">
      <img src="/relaylogo.png" alt="Relay AI Logo">
    </div>
    <div id="messages"></div>
    <div class="input-box">
      <label style="color: #94a3b8; font-size: 0.8rem; display: flex; align-items: center; gap: 5px;">
        <input type="checkbox" id="searchToggle"> Web
      </label>
      <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">SEND</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const box = document.getElementById('messages');
      const searchToggle = document.getElementById('searchToggle').checked;
      const text = input.value.trim();
      
      if (!text) return;

      box.innerHTML += `<div class="msg user">${text}</div>`;
      input.value = '';
      box.scrollTop = box.scrollHeight;

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, useSearch: searchToggle })
        });
        const data = await response.json();
        box.innerHTML += `<div class="msg ai">${marked.parse(data.reply)}</div>`;
      } catch (e) {
        box.innerHTML += `<div class="msg ai">Connection Error.</div>`;
      }
      box.scrollTop = box.scrollHeight;
    }
  </script>
</body>
</html>
